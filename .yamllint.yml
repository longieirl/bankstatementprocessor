extends: default
rules:
  document-start: disable
  empty-lines:
    max: 2
    max-start: 0
    max-end: 1
  line-length:
    max: 200
    level: warning
  comments:
    min-spaces-from-content: 1
  truthy:
    check-keys: false  # permits `on:` in GitHub Actions files
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1
  indentation:
    spaces: 2
    indent-sequences: whatever
    check-multi-line-strings: false
  new-line-at-end-of-file: disable
ignore: |
  .git
  node_modules
  .claude
