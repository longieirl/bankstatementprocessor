[project]
name = "bankstatements-free"
version = "0.1.0"
description = "Free-tier CLI for bankstatements-core PDF bank statement processor"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
authors = [
    {name = "longieirl", email = "noreply@github.com"}
]
keywords = ["pdf", "banking", "statement", "processor", "cli"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "bankstatements-core>=0.1.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-mock>=3.10.0",
    "Faker>=21.0.0",
]

[project.scripts]
bankstatements = "bankstatements_free.app:main"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "unit: marks tests as unit tests",
]
filterwarnings = [
    "ignore:TestResult has no addDuration method:RuntimeWarning",
]

[tool.black]
line-length = 88
target-version = ['py311', 'py312', 'py313']

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["bankstatements_free", "bankstatements_core"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "B",      # flake8-bugbear
    "C901",   # mccabe complexity
    "G",      # flake8-logging-format
    "PLC",    # pylint convention
    "PLR",    # pylint refactoring
    "T201",   # flake8-print
    "BLE001", # flake8-blind-except
    "UP",     # pyupgrade
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",    # line too long — handled by black
    "PLR2004", # magic value comparison — acceptable in tests and config
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**/*.py" = ["F401", "PLC0415"]
"src/bankstatements_free/app.py" = ["T201"]  # CLI entrypoint: intentional user-facing print output
